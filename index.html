<!DOCTYPE html>
<html lang="en">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>K-Drama Companion</title>
  <link rel="stylesheet" href="styles/styles.css">
</head>
<body>

  <header>
    <h1>K-Drama Companion</h1>

      <a href="#">Home</a>
      <a href="#">Search</a>

  <script src="scripts/main.js"></script>

</html>
