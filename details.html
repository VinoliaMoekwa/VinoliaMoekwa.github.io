<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>K-Drama Details</title>
    <link rel="stylesheet" href="styles/details.css" />
  </head>
  <body>
    <main class="page">
      <section class="details-card">
        <img id="drama-poster" class="poster" src="" alt="Poster" />

        <div class="info">
          <h1 id="drama-title">Loading...</h1>
          <p id="drama-rating" class="rating"></p>

          <div class="meta">
            <p><strong>Release Date:</strong> <span id="drama-release-date"></span></p>
            <p><strong>Genre:</strong> <span id="drama-genre"></span></p>
          </div>

          <p id="drama-description" class="description"></p>

          <div class="button-group">
            <button id="favorite-btn" class="favorite-btn">❤ Add to Favorites</button>
            <button id="trailer-btn" class="trailer-btn">▶ Watch Trailer</button>
          </div>
        </div>
      </section>
    </main>

    <script src="scripts/details.js"></script>
  </body>
</html>
